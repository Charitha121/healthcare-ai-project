<!DOCTYPE html>
<html>
<head>
    <title>AI Healthcare Assistant</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            text-align: center;
            background: url('https://images.unsplash.com/photo-1588776814546-ec7e9c6c9c4c') no-repeat center center fixed;
            background-size: cover;
        }

        .container {
            background: rgba(255, 255, 255, 0.9);
            margin: 80px auto;
            padding: 30px;
            width: 40%;
            border-radius: 15px;
            box-shadow: 0px 0px 20px rgba(0,0,0,0.3);
        }

        h1 {
            margin-bottom: 10px;
        }

        .subtitle {
            color: gray;
            font-size: 14px;
            margin-bottom: 20px;
        }

        input {
            width: 85%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 8px;
            border: 1px solid #ccc;
            font-size: 16px;
        }

        button {
            padding: 12px 25px;
            background: green;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background: darkgreen;
        }

        img {
            width: 90px;
            margin-bottom: 10px;
        }

        label {
            display: block;
            text-align: left;
            margin-left: 7%;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <div class="container">

        <!-- 🤖 Robot Doctor -->
        <img src="https://cdn-icons-png.flaticon.com/512/4712/4712109.png" alt="AI Doctor">

        <h1>🧠 AI Healthcare Assistant</h1>

        <p class="subtitle">
            Enter your symptoms and age to get AI-based diagnosis, diet, and medical suggestions
        </p>

        <!-- ✅ FORM -->
        <form action="/analyze" method="post">

            <label>🩺 Symptoms</label>
            <input 
                type="text" 
                name="symptoms" 
                placeholder="Example: fever, headache, diabetes, BP, stomach pain" 
                required
            >

            <label>🎂 Age</label>
            <input 
                type="number" 
                name="age" 
                placeholder="Enter your age" 
                min="1" max="120"
                required
            >

            <br><br>

            <button type="submit">🔍 Analyze Health</button>

        </form>

    </div>

</body>
</html>
